# Site Specific Configuration
title: "Shrutik Panchal | Data Researcher" 
name: "Shrutik Panchal"
description: "Data Researcher specialising in Financial AI, Risk Strategy, and Quantitative Analytics."
url: "https://shrutik-panchal.github.io"
author: "Shrutik Panchal"
timezone: "Asia/Kolkata"
timezone_short: "IST"

# Keywords (These help recruiters and Google find your specific skills)
keywords: ['Shrutik Panchal', 'Data Researcher', 'Financial AI', 'Machine Learning',
           'Quantitative Analytics', 'InsurTech', 'Deep Learning', 'Python', 'SQL', 'R', 'Excel']

# Analytics (Plausible requires sign-up)
analytics:
  plausible:
    enabled: false
    site_fqdn: 'shrutik-panchal.github.io'
    script_source: 'https://plausible.io/js/script.js'

# Styling
sass:
  sass_dir: _sass
  style: expanded # compact, expanded or compressed

# Paginate
pagination:
  enabled: true
  # Value set low for demonstration purposes
  per_page: 3
  sort_field: 'date'
  sort_reverse: true

# Category Paginating
autopages:
  enabled: true
  categories:
    title: 'Posts in category :cat'
    permalink: '/category/:cat'
    silent: false

# Exclusions
exclude: [ 'README.md', 'COPYING' ]

# Plugins
plugins:
  - jekyll-feed
  - jekyll-paginate-v2
  - jekyll-seo-tag